    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #faf7f2;
        --surface: #ffffff;
        --surface2: #f5f0e8;
        --border: rgba(0, 0, 0, 0.08);
        --text: #1a1108;
        --muted: rgba(26, 17, 8, 0.45);
        --gold: #c8922a;
        --gold2: #e8b84b;
        --dark: #1a1108;
      }
      html,
      body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 320px;
        background: linear-gradient(
          160deg,
          #1a1108 0%,
          #2d1f0a 55%,
          #faf7f2 100%
        );
        z-index: 0;
        pointer-events: none;
      }
      .page {
        position: relative;
        z-index: 1;
        max-width: 420px;
        margin: 0 auto;
        padding: 0 1.25rem 3rem;
      }
      .header {
        padding-top: 2.5rem;
        padding-bottom: 1.75rem;
        text-align: center;
        animation: fadeUp 0.5s ease both;
      }
      .avatar-ring {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        margin: 0 auto 12px;
        padding: 3px;
        background: linear-gradient(
          135deg,
          var(--gold),
          var(--gold2),
          var(--gold)
        );
        box-shadow: 0 0 28px rgba(200, 146, 42, 0.4);
      }
      .avatar-ring img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        object-position: top center;
        display: block;
      }
      .header h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 26px;
        font-weight: 600;
        color: #fff;
        letter-spacing: 0.01em;
        margin-bottom: 6px;
      }
      .upi-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.75);
      }
      .upi-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold2);
      }
      .main-card {
        background: var(--surface);
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: 0 8px 40px rgba(26, 17, 8, 0.1);
        overflow: hidden;
        animation: fadeUp 0.5s 0.1s ease both;
      }
      .card-body {
        padding: 1.4rem;
      }
      .section-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--muted);
        text-transform: uppercase;
        font-weight: 500;
        margin-bottom: 8px;
      }
      .quick-row {
        display: flex;
        gap: 8px;
        margin-bottom: 1.2rem;
      }
      .q-btn {
        flex: 1;
        padding: 9px 6px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .q-btn:hover {
        border-color: var(--gold);
        color: var(--gold);
      }
      .q-btn.active {
        background: var(--dark);
        color: var(--gold2);
        border-color: var(--dark);
        box-shadow: 0 2px 12px rgba(26, 17, 8, 0.2);
      }
      .amount-row {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 10px 16px;
        transition: border-color 0.2s;
      }
      .amount-row:focus-within {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(200, 146, 42, 0.12);
      }
      .rupee {
        font-size: 20px;
        font-weight: 600;
        color: var(--muted);
        font-family: "Cormorant Garamond", serif;
      }
      #amount-input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font-family: "Cormorant Garamond", serif;
        font-size: 32px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
        width: 100%;
      }
      #amount-input::placeholder {
        color: rgba(26, 17, 8, 0.15);
      }
      #amount-input::-webkit-inner-spin-button,
      #amount-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }
      .qr-area {
        border-top: 1px solid var(--border);
        padding: 1.4rem;
        text-align: center;
      }
      .amount-show {
        font-family: "Cormorant Garamond", serif;
        font-size: 34px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
        margin-bottom: 2px;
        min-height: 44px;
      }
      .payee-line {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 1rem;
      }
      .qr-frame {
        position: relative;
        display: inline-block;
        margin: 0 auto 0.75rem;
      }
      .qr-frame::before,
      .qr-frame::after,
      .qr-corner-tr,
      .qr-corner-bl {
        content: "";
        position: absolute;
        width: 24px;
        height: 24px;
        border-color: var(--dark);
        border-style: solid;
        z-index: 3;
        pointer-events: none;
      }
      .qr-frame::before {
        top: -2px;
        left: -2px;
        border-width: 3px 0 0 3px;
        border-radius: 4px 0 0 0;
      }
      .qr-frame::after {
        bottom: -2px;
        right: -2px;
        border-width: 0 3px 3px 0;
        border-radius: 0 0 4px 0;
      }
      .qr-corner-tr {
        top: -2px;
        right: -2px;
        border-width: 3px 3px 0 0;
        border-radius: 0 4px 0 0;
      }
      .qr-corner-bl {
        bottom: -2px;
        left: -2px;
        border-width: 0 0 3px 3px;
        border-radius: 0 0 0 4px;
      }
      #styled-qr-canvas {
        display: block;
        border-radius: 12px;
        border: 1px solid rgba(26, 17, 8, 0.06);
      }
      .scan-line {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        font-size: 12px;
        color: var(--muted);
        margin: 0.75rem 0;
      }
      .scan-line::before,
      .scan-line::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
        max-width: 50px;
      }
      .apps-row {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .app-pill {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        color: var(--muted);
      }
      .app-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--dark);
        color: white;
        border-radius: 12px;
        padding: 10px 20px;
        font-size: 13px;
        z-index: 999;
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast.success {
        background: #1b5e20;
      }
      .toast.error {
        background: #b71c1c;
      }
      .toast-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--gold2);
      }

      .footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 11px;
        color: rgba(26, 17, 8, 0.25);
        animation: fadeUp 0.5s 0.2s ease both;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .footer::before,
      .footer::after {
        content: "";
        width: 30px;
        height: 1px;
        background: rgba(26, 17, 8, 0.12);
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (max-width: 480px) {
        #amount-input {
          font-size: 26px;
        }
        .amount-show {
          font-size: 26px;
        }
      }
    </style>
  </head>

      // Save transaction to Firebase
      async function saveTransaction(amount) {

            upi_id: UPI_ID,
            timestamp: window._fbServerTimestamp(),
            status: "qr_generated",
            date: new Date().toISOString().split("T")[0],
            month: new Date().toISOString().slice(0, 7),
          });
          lastSavedAmt = amount;
          showToast("✓ Transaction recorded", "success");
        } catch (e) {
          console.error("Firebase error:", e);
          showToast("DB not configured yet", "error");
        }
      }

      function preloadPhoto() {
        const avatarSrc = document.getElementById("avatar-img").src;
        photoImg = new Image();
        photoImg.onload = () => renderQR();
        photoImg.onerror = () => {
          photoImg = null;
          renderQR();
        };
        photoImg.src = avatarSrc;
      }

      function setAmt(val, btn) {
        currentAmt = val;
        document.getElementById("amount-input").value = val;
        document
          .querySelectorAll(".q-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        lastSavedAmt = null;
        renderQR();
      }

      function onInput() {
        const v = parseFloat(document.getElementById("amount-input").value);
        currentAmt = v > 0 ? v : 0;
        document
          .querySelectorAll(".q-btn")
          .forEach((b) => b.classList.remove("active"));
        lastSavedAmt = null;
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(renderQR, 350);
      }

      function renderQR() {
        const amtShow = document.getElementById("amount-show");
        const canvas = document.getElementById("styled-qr-canvas");
        if (!currentAmt || currentAmt <= 0) {
          amtShow.innerHTML =
            '<span style="font-size:16px;font-family:DM Sans,sans-serif;font-weight:400;color:var(--muted);">Enter amount</span>';
          const ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, 250, 250);
          return;
        }
        amtShow.textContent = "₹" + currentAmt.toLocaleString("en-IN");
        const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(PAYEE)}&am=${currentAmt}&cu=INR`;
        buildPhotoQR(upiUrl, canvas);
        // Save to database after short delay (QR was generated = payment intent)
        clearTimeout(window._saveTimer);
        window._saveTimer = setTimeout(() => saveTransaction(currentAmt), 1500);
      }

      function buildPhotoQR(text, outCanvas) {
        const SIZE = 250;
        const OFFSET = 8;
        const src = document.getElementById("qr-source");
        src.innerHTML = "";
        new QRCode(src, {
          text,
          width: 33 * 8,
          height: 33 * 8,
          colorDark: "#000",
          colorLight: "#fff",
          correctLevel: QRCode.CorrectLevel.H,
        });
        setTimeout(() => {
          const rawCanvas = src.querySelector("canvas");
          if (!rawCanvas) return;
          const rawCtx = rawCanvas.getContext("2d");
          const rawW = rawCanvas.width;
          const imgData = rawCtx.getImageData(0, 0, rawW, rawW);
          const mods = rawW / 8;
          const matrix = [];
          for (let r = 0; r < mods; r++) {
            matrix[r] = [];
            for (let c = 0; c < mods; c++) {
              const i = (r * 8 + 4) * rawW * 4 + (c * 8 + 4) * 4;
              matrix[r][c] = imgData.data[i] < 128 ? 1 : 0;
            }
          }
          const ctx = outCanvas.getContext("2d");
          outCanvas.width = SIZE;
          outCanvas.height = SIZE;
          const cell = (SIZE - OFFSET * 2) / mods;
          // Background: photo
          if (photoImg && photoImg.complete && photoImg.naturalWidth > 0) {
            ctx.save();
            ctx.beginPath();
            rrPath(ctx, 0, 0, SIZE, SIZE, 12);
            ctx.clip();
            ctx.drawImage(
              photoImg,
              0,
              0,
              photoImg.naturalWidth,
              photoImg.naturalHeight * 0.65,
              0,
              0,
              SIZE,
              SIZE,
            );
            ctx.fillStyle = "rgba(250,245,235,0.38)";
            ctx.fillRect(0, 0, SIZE, SIZE);
            ctx.restore();
          } else {
            ctx.fillStyle = "#FDF8F0";
            ctx.beginPath();
            rrPath(ctx, 0, 0, SIZE, SIZE, 12);
            ctx.fill();
          }
          // Modules
          for (let r = 0; r < mods; r++) {
            for (let c = 0; c < mods; c++) {
              if (!matrix[r][c]) continue;
              const x = OFFSET + c * cell,
                y = OFFSET + r * cell;
              const inTL = r < 7 && c < 7,
                inTR = r < 7 && c >= mods - 7,
                inBL = r >= mods - 7 && c < 7;
              if (inTL || inTR || inBL) {
                ctx.fillStyle = "rgba(20,12,3,0.92)";
                ctx.beginPath();
                rrPath(
                  ctx,
                  x + 0.4,
                  y + 0.4,
                  cell - 0.8,
                  cell - 0.8,
                  r === 0 || r === 6 || c === 0 || c === 6 ? 2.5 : 1.5,
                );
                ctx.fill();
              } else {
                ctx.fillStyle = `rgba(18,10,2,${0.82 + Math.random() * 0.15})`;
                ctx.beginPath();
                ctx.arc(
                  x + cell / 2,
                  y + cell / 2,
                  cell * 0.38,
                  0,
                  Math.PI * 2,
                );
                ctx.fill();
              }
            }
          }
          drawFinder(ctx, OFFSET, OFFSET, cell, mods);
          drawFinder(ctx, OFFSET + (mods - 7) * cell, OFFSET, cell, mods);
          drawFinder(ctx, OFFSET, OFFSET + (mods - 7) * cell, cell, mods);
          // Center face
          if (photoImg && photoImg.complete) {
            const ls = Math.floor(cell * 5);
            ctx.save();
            ctx.fillStyle = "rgba(255,255,255,0.95)";
            ctx.beginPath();
            ctx.arc(SIZE / 2, SIZE / 2, ls / 2 + 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(SIZE / 2, SIZE / 2, ls / 2, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(
              photoImg,
              0,
              0,
              photoImg.naturalWidth,
              photoImg.naturalHeight * 0.5,
              SIZE / 2 - ls / 2,
              SIZE / 2 - ls / 2,
              ls,
              ls,
            );
            ctx.restore();
            ctx.strokeStyle = "#c8922a";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(SIZE / 2, SIZE / 2, ls / 2 + 3, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.strokeStyle = "rgba(26,17,8,0.08)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          rrPath(ctx, 0.5, 0.5, SIZE - 1, SIZE - 1, 12);
          ctx.stroke();
        }, 120);
      }

      function drawFinder(ctx, ox, oy, cell) {
        const total = cell * 7;
        ctx.strokeStyle = "rgba(18,10,2,0.92)";
        ctx.lineWidth = cell * 0.85;
        ctx.beginPath();
        rrPath(
          ctx,
          ox + (cell * 0.425) / 2,
          oy + (cell * 0.425) / 2,
          total - cell * 0.425,
          total - cell * 0.425,
          3.5,
        );
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = cell * 0.75;
        ctx.beginPath();
        rrPath(
          ctx,
          ox + cell * 1.1,
          oy + cell * 1.1,
          cell * 4.8,
          cell * 4.8,
          2,
        );
        ctx.stroke();
        ctx.fillStyle = "rgba(18,10,2,0.92)";
        ctx.beginPath();
        rrPath(
          ctx,
          ox + cell * 2 + 0.5,
          oy + cell * 2 + 0.5,
          cell * 3 - 1,
          cell * 3 - 1,
          2,
        );
        ctx.fill();
      }

      function rrPath(ctx, x, y, w, h, r) {
        if (ctx.roundRect) {
          ctx.roundRect(x, y, w, h, r);
        } else {
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.arcTo(x + w, y, x + w, y + r, r);
          ctx.lineTo(x + w, y + h - r);
          ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
          ctx.lineTo(x + r, y + h);
          ctx.arcTo(x, y + h, x, y + h - r, r);
          ctx.lineTo(x, y + r);
          ctx.arcTo(x, y, x + r, y, r);
          ctx.closePath();
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".q-btn")[0].classList.add("active");
        preloadPhoto();
      });
    </script>
  </body>
</html>
